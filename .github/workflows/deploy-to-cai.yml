name: Deploy X-ray Detection to CAI

on:
  workflow_dispatch:
    inputs:
      model_type:
        description: 'Model architecture'
        required: true
        default: 'yolo'
        type: choice
        options:
          - yolo
          - vlm
          - vlm_phase_b
          - vlm_eval
      dataset:
        description: '[YOLO] Dataset to train on'
        required: false
        default: 'luggage_xray'
        type: choice
        options:
          - xray_baggage
          - luggage_xray
          - combined_xray_yolo
          - cargoxray
          - stcray
      yolo_model:
        description: '[YOLO] Model variant (yolov8n=fastest, yolov8s=balanced, yolov8m=accurate)'
        required: false
        default: 'yolov8n.pt'
        type: string
      yolo_epochs:
        description: '[YOLO] Training epochs'
        required: false
        default: '100'
        type: string
      export_onnx:
        description: '[YOLO] Export to ONNX after training'
        required: false
        default: false
        type: boolean
      force_reinstall:
        description: 'Force environment reinstall'
        required: false
        default: false
        type: boolean
      trigger_jobs:
        description: 'Automatically trigger pipeline after setup'
        required: false
        default: false
        type: boolean
      deploy_api:
        description: '[YOLO] Deploy trained model as CAI Application with exposed endpoints'
        required: false
        default: true
        type: boolean
      api_subdomain:
        description: '[YOLO] Custom subdomain for API (e.g., xray-yolo-v2)'
        required: false
        default: 'xray-yolo-api'
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # Download Git LFS files (datasets)

      - name: Check model type configuration
        run: |
          echo "🔍 Checking model type: ${{ github.event.inputs.model_type }}"
          if [ "${{ github.event.inputs.model_type }}" = "yolo" ]; then
            echo "✅ Using YOLO detection model"
            echo "   Dataset: ${{ github.event.inputs.dataset }}"
            echo "   Model: ${{ github.event.inputs.yolo_model }}"
            echo "   Epochs: ${{ github.event.inputs.yolo_epochs }}"
            echo "   Export ONNX: ${{ github.event.inputs.export_onnx }}"
            case "${{ github.event.inputs.dataset }}" in
              xray_baggage)       echo "   🚀 X-Ray Baggage: Quick test (~30-45 min GPU / 2-3h CPU, 1.5K imgs, Git LFS)" ;;
              cargoxray)          echo "   🚀 CargoXray: Quick baseline (~1 h, Git LFS)" ;;
              luggage_xray)       echo "   🚀 Luggage X-ray: Fast training (~2 h, 6K imgs)" ;;
              combined_xray_yolo) echo "   🚀 Combined: luggage_xray + STCray + baggage (~4 h, 55K imgs, Git LFS)" ;;
              stcray)             echo "   🚀 STCray only: Production model (~4 h, Git LFS)" ;;
            esac
          elif [ "${{ github.event.inputs.model_type }}" = "vlm" ]; then
            echo "✅ Using VLM Phase A (Qwen3-VL-2B QLoRA domain adaptation)"
            echo "   Pipeline: setup → download STCray → convert to VQA → train QLoRA → evaluate"
          elif [ "${{ github.event.inputs.model_type }}" = "vlm_phase_b" ]; then
            echo "✅ Using VLM Phase B (Proposal-Guided Dual-Format Training)"
            echo "   Pipeline: setup → HiXray → class-agnostic YOLO → VQA data → train PG-RAV → merge → evaluate"
          elif [ "${{ github.event.inputs.model_type }}" = "vlm_eval" ]; then
            echo "✅ Using VLM Evaluation (Calibration + Adaptive Loop + Declaration)"
            echo "   Pipeline: setup → category hints → E_cal → E_adapt → E7"
          fi

      - name: Validate configuration files
        run: |
          echo "🔍 Validating configuration files..."
          MODEL_TYPE="${{ github.event.inputs.model_type }}"
          case "$MODEL_TYPE" in
            yolo)         test -f cai_integration/jobs_config_yolo.yaml ;;
            vlm)          test -f cai_integration/jobs_config_vlm.yaml ;;
            vlm_phase_b)  test -f cai_integration/jobs_config_vlm_phase_b.yaml ;;
            vlm_eval)     test -f cai_integration/jobs_config_vlm_eval.yaml ;;
          esac
          test -f cai_integration/create_jobs.py
          test -f cai_integration/trigger_jobs.py
          echo "✅ Configuration files validated"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Validate YAML syntax
        run: |
          echo "🔍 Validating YAML syntax..."
          pip install pyyaml
          MODEL_TYPE="${{ github.event.inputs.model_type }}"
          case "$MODEL_TYPE" in
            yolo)         CONFIG="cai_integration/jobs_config_yolo.yaml" ;;
            vlm)          CONFIG="cai_integration/jobs_config_vlm.yaml" ;;
            vlm_phase_b)  CONFIG="cai_integration/jobs_config_vlm_phase_b.yaml" ;;
            vlm_eval)     CONFIG="cai_integration/jobs_config_vlm_eval.yaml" ;;
          esac
          python -c "import yaml; yaml.safe_load(open('$CONFIG'))"
          echo "✅ YAML syntax valid"

  setup-project:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      project_id: ${{ steps.setup.outputs.project_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # Download Git LFS files (datasets)

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Setup CAI Project
        id: setup
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Setting up CAI project for X-ray VQA..."
          python cai_integration/setup_project.py
          PROJECT_ID=$(cat /tmp/project_id.txt)
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "✅ Project ID: $PROJECT_ID"

      - name: Create job summary
        if: always()
        run: |
          echo "## X-ray VQA Setup: Project" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project ID**: ${{ steps.setup.outputs.project_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  create-jobs:
    needs: setup-project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # Download Git LFS files (datasets)

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Update jobs config with parameters
        run: |
          echo "📝 Updating jobs config with parameters..."
          python3 << 'PYTHON_SCRIPT'
          import yaml
          
          model_type = '${{ github.event.inputs.model_type }}'
          config_map = {
              'yolo': 'cai_integration/jobs_config_yolo.yaml',
              'vlm': 'cai_integration/jobs_config_vlm.yaml',
              'vlm_phase_b': 'cai_integration/jobs_config_vlm_phase_b.yaml',
              'vlm_eval': 'cai_integration/jobs_config_vlm_eval.yaml',
          }
          config_file = config_map.get(model_type, 'cai_integration/jobs_config_vlm.yaml')
          
          with open(config_file) as f:
              config = yaml.safe_load(f)
          
          # Update force_reinstall for all model types
          config['jobs']['setup_environment']['environment']['FORCE_REINSTALL'] = 'true' if '${{ github.event.inputs.force_reinstall }}' == 'true' else 'false'
          
          if model_type == 'yolo':
              # Configure YOLO-specific parameters
              dataset = '${{ github.event.inputs.dataset }}'
              config['jobs']['yolo_training']['environment']['MODEL_NAME'] = '${{ github.event.inputs.yolo_model }}'
              config['jobs']['yolo_training']['environment']['EPOCHS'] = '${{ github.event.inputs.yolo_epochs }}'
              config['jobs']['yolo_training']['environment']['EXPORT_ONNX'] = 'true' if '${{ github.event.inputs.export_onnx }}' == 'true' else 'false'
              config['jobs']['yolo_training']['environment']['DATASET'] = dataset

              # Adjust timeout and dependencies based on dataset
              if dataset == 'xray_baggage':
                  # X-Ray Baggage only — from Git LFS, quick test
                  # Can run on CPU (2-3h) or GPU (30-45min)
                  config['jobs']['yolo_training']['timeout'] = 10800  # 3 hours (accommodate CPU training)
                  config['jobs']['yolo_training']['parent_job_key'] = 'download_xray_baggage'
                  config['jobs']['yolo_training']['gpu'] = 0  # CPU-only for small dataset
                  config['jobs']['yolo_training'].setdefault('environment', {})['YOLO_DEVICE'] = 'cpu'
                  if 'download_luggage_xray' in config['jobs']:
                      del config['jobs']['download_luggage_xray']
                  if 'download_dataset' in config['jobs']:
                      del config['jobs']['download_dataset']
                  if 'combine_datasets' in config['jobs']:
                      del config['jobs']['combine_datasets']
                  print(f"✓ X-Ray Baggage: Git LFS → extract COCO → convert to YOLO")
              elif dataset == 'luggage_xray':
                  # Luggage X-ray only — no STCray, no combine step
                  config['jobs']['yolo_training']['timeout'] = 7200  # 2 hours
                  config['jobs']['yolo_training']['parent_job_key'] = 'download_luggage_xray'
                  if 'download_dataset' in config['jobs']:
                      del config['jobs']['download_dataset']
                  if 'download_xray_baggage' in config['jobs']:
                      del config['jobs']['download_xray_baggage']
                  if 'combine_datasets' in config['jobs']:
                      del config['jobs']['combine_datasets']
                  print(f"✓ Luggage X-ray: Will download from Roboflow")
              elif dataset == 'combined_xray_yolo':
                  # Combined: needs luggage_xray + STCray (from Git LFS) + baggage + combine step
                  config['jobs']['yolo_training']['timeout'] = 14400  # 4 hours
                  config['jobs']['yolo_training']['parent_job_key'] = 'combine_datasets'
                  print(f"✓ Combined dataset: luggage_xray + STCray + baggage (Git LFS) → combine_datasets → yolo_training")
              elif dataset == 'cargoxray':
                  # CargoXray is in Git LFS, no download needed
                  config['jobs']['yolo_training']['timeout'] = 3600  # 1 hour
                  config['jobs']['yolo_training']['parent_job_key'] = 'setup_environment'
                  if 'download_luggage_xray' in config['jobs']:
                      del config['jobs']['download_luggage_xray']
                  if 'download_dataset' in config['jobs']:
                      del config['jobs']['download_dataset']
                  if 'download_xray_baggage' in config['jobs']:
                      del config['jobs']['download_xray_baggage']
                  if 'combine_datasets' in config['jobs']:
                      del config['jobs']['combine_datasets']
                  print(f"✓ CargoXray: Using Git LFS (no download job needed)")
              else:  # stcray
                  # STCray only — RAR files pulled from Git LFS by setup_environment
                  config['jobs']['yolo_training']['timeout'] = 14400  # 4 hours
                  config['jobs']['yolo_training']['parent_job_key'] = 'download_dataset'
                  config['jobs']['download_dataset']['timeout'] = 3600  # 1 hour
                  if 'download_luggage_xray' in config['jobs']:
                      del config['jobs']['download_luggage_xray']
                  if 'download_xray_baggage' in config['jobs']:
                      del config['jobs']['download_xray_baggage']
                  if 'combine_datasets' in config['jobs']:
                      del config['jobs']['combine_datasets']
                  print(f"✓ STCray: RAR files from Git LFS → extract → process annotations")

              print(f"✓ YOLO configuration:")
              print(f"  Dataset: {dataset}")
              print(f"  Model: {config['jobs']['yolo_training']['environment']['MODEL_NAME']}")
              print(f"  Epochs: {config['jobs']['yolo_training']['environment']['EPOCHS']}")
              print(f"  Export ONNX: {config['jobs']['yolo_training']['environment']['EXPORT_ONNX']}")
              print(f"  Parent Job: {config['jobs']['yolo_training']['parent_job_key']}")
              print(f"  Timeout: {config['jobs']['yolo_training']['timeout']}s")
          else:
              # VLM pipelines — no runtime params needed, config is self-contained
              labels = {
                  'vlm': 'Phase A (domain adaptation on STCray)',
                  'vlm_phase_b': 'Phase B (proposal-guided dual-format training)',
                  'vlm_eval': 'Evaluation (calibration + adaptive loop + declaration)',
              }
              print(f"✓ VLM configuration: {labels.get(model_type, model_type)}")
              print(f"  Config: {config_file}")
          
          with open(config_file, 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          PYTHON_SCRIPT
          echo "✅ Configuration updated"

      - name: Create CAI Jobs
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
        run: |
          MODEL_TYPE="${{ github.event.inputs.model_type }}"
          case "$MODEL_TYPE" in
            yolo)         CONFIG_FILE="cai_integration/jobs_config_yolo.yaml" ;;
            vlm)          CONFIG_FILE="cai_integration/jobs_config_vlm.yaml" ;;
            vlm_phase_b)  CONFIG_FILE="cai_integration/jobs_config_vlm_phase_b.yaml" ;;
            vlm_eval)     CONFIG_FILE="cai_integration/jobs_config_vlm_eval.yaml" ;;
          esac
          echo "📋 Creating $MODEL_TYPE jobs..."

          echo "Using config: $CONFIG_FILE"
          python cai_integration/create_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }} \
            --config "$CONFIG_FILE"
          echo "✅ Jobs created"

      - name: Create job summary
        if: always()
        run: |
          MODEL_TYPE="${{ github.event.inputs.model_type }}"
          
          echo "## X-ray Detection Setup: Jobs" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model Type**: $MODEL_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$MODEL_TYPE" = "yolo" ]; then
            echo "### YOLO Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- **Dataset**: ${{ github.event.inputs.dataset }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Model**: ${{ github.event.inputs.yolo_model }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Epochs**: ${{ github.event.inputs.yolo_epochs }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Export ONNX**: ${{ github.event.inputs.export_onnx }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Jobs Created" >> $GITHUB_STEP_SUMMARY
            echo "1. setup_environment" >> $GITHUB_STEP_SUMMARY
            echo "2. download_dataset" >> $GITHUB_STEP_SUMMARY
            echo "3. yolo_training ← Fine-tuning job" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event.inputs.deploy_api }}" = "true" ]; then
              echo "4. deploy_yolo_application ← API deployment job" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$MODEL_TYPE" = "vlm" ]; then
            echo "### VLM Phase A (Domain Adaptation)" >> $GITHUB_STEP_SUMMARY
            echo "- **Model**: Qwen/Qwen3-VL-2B-Instruct" >> $GITHUB_STEP_SUMMARY
            echo "- **Method**: QLoRA on STCray (46K images, 21 threat categories)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Jobs: setup → download → convert → train → evaluate" >> $GITHUB_STEP_SUMMARY
          elif [ "$MODEL_TYPE" = "vlm_phase_b" ]; then
            echo "### VLM Phase B (Proposal-Guided Training)" >> $GITHUB_STEP_SUMMARY
            echo "- **Model**: Qwen/Qwen3-VL-2B-Instruct (extends Phase A)" >> $GITHUB_STEP_SUMMARY
            echo "- **Method**: Dual-format QLoRA on STCray + HiXray with YOLO proposals" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Jobs (8-step chain)" >> $GITHUB_STEP_SUMMARY
            echo "1. setup_environment (YOLO + VLM deps)" >> $GITHUB_STEP_SUMMARY
            echo "2. prepare_hixray (extract dataset)" >> $GITHUB_STEP_SUMMARY
            echo "3. prepare_class_agnostic_yolo (merge bboxes)" >> $GITHUB_STEP_SUMMARY
            echo "4. train_yolo_class_agnostic (~4-6h L40)" >> $GITHUB_STEP_SUMMARY
            echo "5. create_pgrav_vqa (dual-format VQA data)" >> $GITHUB_STEP_SUMMARY
            echo "6. train_vlm_phase_b (~12-18h L40)" >> $GITHUB_STEP_SUMMARY
            echo "7. merge_lora (merge adapter)" >> $GITHUB_STEP_SUMMARY
            echo "8. evaluate_vlm (Phase A vs Phase B)" >> $GITHUB_STEP_SUMMARY
          elif [ "$MODEL_TYPE" = "vlm_eval" ]; then
            echo "### VLM Evaluation Experiments" >> $GITHUB_STEP_SUMMARY
            echo "- E_cal: Logprob calibration (ECE < 0.15)" >> $GITHUB_STEP_SUMMARY
            echo "- E_adapt: Single-pass vs adaptive loop (>= 5% recall gain)" >> $GITHUB_STEP_SUMMARY
            echo "- E7: End-to-end declaration matching (F1)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Jobs: setup → hints → calibration → adaptive loop → declaration" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Force Reinstall**: ${{ github.event.inputs.force_reinstall }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "$MODEL_TYPE" = "yolo" ] && [ "${{ github.event.inputs.deploy_api }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### API Deployment" >> $GITHUB_STEP_SUMMARY
            echo "After training completes, the model will be automatically deployed as a CAI Application:" >> $GITHUB_STEP_SUMMARY
            echo "- **Subdomain**: ${{ github.event.inputs.api_subdomain }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Endpoints**: /health, /docs, /v1/detect, /v1/chat/completions" >> $GITHUB_STEP_SUMMARY
            echo "- **Access**: https://${{ github.event.inputs.api_subdomain }}.[your-domain]" >> $GITHUB_STEP_SUMMARY
          fi

  deploy-yolo-api:
    needs: [setup-project, create-jobs, trigger-pipeline]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      always() &&
      github.event.inputs.model_type == 'yolo' &&
      github.event.inputs.deploy_api == 'true' &&
      needs.create-jobs.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Update deployment job configuration
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
        run: |
          echo "📝 Configuring YOLO API deployment job..."
          python3 << 'PYTHON_SCRIPT'
          import yaml
          
          config_file = 'cai_integration/jobs_config_yolo.yaml'
          
          with open(config_file) as f:
              config = yaml.safe_load(f)
          
          # Update deployment job configuration
          if 'deploy_yolo_application' in config['jobs']:
              config['jobs']['deploy_yolo_application']['environment']['CAI_API_KEY'] = '${{ secrets.CML_API_KEY }}'
              config['jobs']['deploy_yolo_application']['environment']['CAI_DOMAIN'] = '${{ secrets.CML_HOST }}'
              config['jobs']['deploy_yolo_application']['environment']['APP_SUBDOMAIN'] = '${{ github.event.inputs.api_subdomain }}'
              
              # Determine MODEL_PATH and parent_job_key based on workflow context
              # If trigger_jobs=true: training happens, so auto-detect (empty string) and depend on yolo_training
              # If trigger_jobs=false: deploy pre-trained model directly, use yolo_model input and depend on setup_environment
              trigger_jobs = '${{ github.event.inputs.trigger_jobs }}' == 'true'
              yolo_model = '${{ github.event.inputs.yolo_model }}'
              
              if trigger_jobs:
                  # Auto-detect trained model after training completes
                  model_path = ""
                  model_desc = "Auto-detect from training"
                  # Keep parent_job_key as 'yolo_training' (default in config)
              else:
                  # Deploy pre-trained model directly (skip training)
                  model_path = yolo_model
                  model_desc = f"Pre-trained: {yolo_model}"
                  # Change parent_job_key to setup_environment (no training needed)
                  config['jobs']['deploy_yolo_application']['parent_job_key'] = 'setup_environment'
              
              config['jobs']['deploy_yolo_application']['environment']['MODEL_PATH'] = model_path
              
              print(f"✓ Deployment job configured:")
              print(f"  Subdomain: ${{ github.event.inputs.api_subdomain }}")
              print(f"  Model: {model_desc}")
              print(f"  Parent: {config['jobs']['deploy_yolo_application']['parent_job_key']}")
              if trigger_jobs:
                  print(f"  API will be deployed after training completes")
              else:
                  print(f"  API will be deployed directly with pre-trained model")
          
          with open(config_file, 'w') as f:
              yaml.dump(config, f, default_flow_style=False)
          PYTHON_SCRIPT
          echo "✅ Deployment configuration updated"

      - name: Enable deployment job in CAI
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
        run: |
          echo "🔄 Updating deployment job in CAI..."
          python cai_integration/create_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }} \
            --config cai_integration/jobs_config_yolo.yaml
          echo "✅ Deployment job updated and ready"

      - name: Create deployment summary
        if: always()
        run: |
          echo "## YOLO API Deployment Configuration" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Subdomain**: ${{ github.event.inputs.api_subdomain }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event.inputs.trigger_jobs }}" == "true" ]]; then
            echo "- **Model**: Auto-detect from training" >> $GITHUB_STEP_SUMMARY
            echo "- **Trigger**: Automatically after training completes" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Model**: Pre-trained ${{ github.event.inputs.yolo_model }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Trigger**: Directly after environment setup" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Startup Time**: 1-2 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Endpoints (after deployment)" >> $GITHUB_STEP_SUMMARY
          echo "- Health Check: \`GET https://${{ github.event.inputs.api_subdomain }}.[domain]/health\`" >> $GITHUB_STEP_SUMMARY
          echo "- API Docs: \`GET https://${{ github.event.inputs.api_subdomain }}.[domain]/docs\`" >> $GITHUB_STEP_SUMMARY
          echo "- Direct Detection: \`POST https://${{ github.event.inputs.api_subdomain }}.[domain]/v1/detect\`" >> $GITHUB_STEP_SUMMARY
          echo "- OpenAI Format: \`POST https://${{ github.event.inputs.api_subdomain }}.[domain]/v1/chat/completions\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Monitoring" >> $GITHUB_STEP_SUMMARY
          echo "1. Check job status in CAI UI: Jobs → deploy_yolo_application" >> $GITHUB_STEP_SUMMARY
          echo "2. View application status: Applications → xray-yolo-detection-api" >> $GITHUB_STEP_SUMMARY
          echo "3. Check application logs for any errors" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Testing the Deployed API" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Health check" >> $GITHUB_STEP_SUMMARY
          echo "curl https://${{ github.event.inputs.api_subdomain }}.[your-domain]/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Test detection" >> $GITHUB_STEP_SUMMARY
          echo "curl -X POST https://${{ github.event.inputs.api_subdomain }}.[your-domain]/v1/detect \\" >> $GITHUB_STEP_SUMMARY
          echo "  -F 'file=@image.jpg'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  trigger-pipeline:
    needs: [setup-project, create-jobs]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.inputs.trigger_jobs == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true  # Download Git LFS files (datasets)

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Trigger Pipeline
        env:
          CML_HOST: ${{ secrets.CML_HOST }}
          CML_API_KEY: ${{ secrets.CML_API_KEY }}
        run: |
          MODEL_TYPE="${{ github.event.inputs.model_type }}"
          case "$MODEL_TYPE" in
            yolo)         CONFIG_FILE="cai_integration/jobs_config_yolo.yaml" ;;
            vlm)          CONFIG_FILE="cai_integration/jobs_config_vlm.yaml" ;;
            vlm_phase_b)  CONFIG_FILE="cai_integration/jobs_config_vlm_phase_b.yaml" ;;
            vlm_eval)     CONFIG_FILE="cai_integration/jobs_config_vlm_eval.yaml" ;;
          esac
          echo "🚀 Triggering $MODEL_TYPE pipeline..."
          echo "Note: This only triggers the root job (setup_environment)"
          echo "Child jobs will auto-trigger via CAI dependencies"
          python cai_integration/trigger_jobs.py \
            --project-id ${{ needs.setup-project.outputs.project_id }} \
            --jobs-config "$CONFIG_FILE"
          echo "✅ Pipeline triggered"

      - name: Create summary
        if: always()
        run: |
          MODEL_TYPE="${{ github.event.inputs.model_type }}"
          echo "## X-ray $MODEL_TYPE Pipeline Triggered" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Monitor job execution in CAI UI: Jobs > Job Runs" >> $GITHUB_STEP_SUMMARY
          echo "2. Check logs for any errors" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          case "$MODEL_TYPE" in
            yolo)
              echo "### YOLO Job Chain" >> $GITHUB_STEP_SUMMARY
              echo "- setup_environment (triggered now)" >> $GITHUB_STEP_SUMMARY
              echo "- download_dataset → yolo_training" >> $GITHUB_STEP_SUMMARY
              ;;
            vlm)
              echo "### VLM Phase A Job Chain" >> $GITHUB_STEP_SUMMARY
              echo "- setup_environment (triggered now)" >> $GITHUB_STEP_SUMMARY
              echo "- download_dataset → convert_stcray_vlm → train_vlm_qlora → evaluate_vlm" >> $GITHUB_STEP_SUMMARY
              ;;
            vlm_phase_b)
              echo "### VLM Phase B Job Chain (8 jobs)" >> $GITHUB_STEP_SUMMARY
              echo "- setup_environment (triggered now)" >> $GITHUB_STEP_SUMMARY
              echo "- prepare_hixray → prepare_yolo → train_yolo → create_vqa → train_vlm → merge → evaluate" >> $GITHUB_STEP_SUMMARY
              ;;
            vlm_eval)
              echo "### VLM Eval Job Chain (5 jobs)" >> $GITHUB_STEP_SUMMARY
              echo "- setup_environment (triggered now)" >> $GITHUB_STEP_SUMMARY
              echo "- build_hints → eval_calibration → eval_adaptive_loop → eval_declaration" >> $GITHUB_STEP_SUMMARY
              ;;
          esac

