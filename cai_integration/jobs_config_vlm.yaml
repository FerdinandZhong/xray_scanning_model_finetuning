# CAI Job Pipeline for VLM (Qwen3-VL-2B) QLoRA Fine-Tuning
#
# Phase A of the PG-RAV curriculum: X-ray domain adaptation on STCray dataset.
# Fine-tunes Qwen3-VL-2B-Instruct with QLoRA for multi-object X-ray threat detection.
#
# This file MUST live at: cai_integration/jobs_config_vlm.yaml
# Used by: python cai_integration/create_jobs.py --config cai_integration/jobs_config_vlm.yaml
#
# Pipeline:
#   setup_environment → download_dataset → convert_stcray_vlm → train_vlm_qlora → evaluate_vlm
#
# Environment Variables (override at trigger time via --env KEY=VALUE):
#   MODEL_NAME:    Model to fine-tune (default: Qwen/Qwen3-VL-2B-Instruct)
#   BATCH_SIZE:    Training batch size (default: 2 for T4 16GB VRAM)
#   EPOCHS:        Number of training epochs (default: 3)
#   LORA_R:        LoRA rank (default: 16)
#   LORA_ALPHA:    LoRA alpha (default: 32)
#   LEARNING_RATE: Learning rate (default: 2e-4)
#   RESUME_FROM_CHECKPOINT: Checkpoint path to resume from (default: "" = fresh start)
#
# Job Dependencies (auto-triggered by CAI on parent success):
#   setup_environment → download_dataset → convert_stcray_vlm → train_vlm_qlora → evaluate_vlm

jobs:
  # Job 1: Setup Python Environment (ROOT JOB)
  setup_environment:
    name: "VLM Setup Python Environment"
    description: "Create Python venv and install dependencies (PyTorch, Transformers, PEFT, TRL, BitsAndBytes)"
    script: "cai_integration/setup_environment.py"
    kernel: "python3"
    cpu: 4
    memory: 16
    timeout: 3600  # 1 hour
    parent_job_key: null
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      FORCE_REINSTALL: "false"
      REQUIREMENTS_FILE: "setup/requirements_vlm_train.txt"

  # Job 2: Download STCray Dataset
  download_dataset:
    name: "VLM Download STCray Dataset"
    description: "Download STCray dataset from HuggingFace (46K images, 21 threat categories)"
    script: "cai_integration/download_dataset.py"
    kernel: "python3"
    cpu: 4
    memory: 8
    timeout: 3600  # 1 hour
    parent_job_key: "setup_environment"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      FORCE_REPROCESS: "false"

  # Job 3: Convert STCray to VLM Format
  convert_stcray_vlm:
    name: "VLM Convert STCray to VQA Format"
    description: "Transform STCray annotations to VQA-style JSONL for VLM training (train/val/test splits)"
    script: "cai_integration/convert_stcray_vlm.py"
    kernel: "python3"
    cpu: 4
    memory: 16
    timeout: 1800  # 30 minutes
    parent_job_key: "download_dataset"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      INPUT_DIR: "data/stcray_processed"
      OUTPUT_DIR: "data/stcray_vlm"
      VAL_RATIO: "0.1"
      SEED: "42"

  # Job 4: Train VLM with QLoRA
  train_vlm_qlora:
    name: "VLM Train Qwen3-VL-2B QLoRA"
    description: "Fine-tune Qwen3-VL-2B-Instruct with QLoRA on STCray VQA dataset (Phase A domain adaptation, L40 GPU)"
    script: "cai_integration/train_vlm.py"
    kernel: "python3"
    cpu: 8
    memory: 96
    gpu: 1
    timeout: 86400  # 48 hours
    parent_job_key: "convert_stcray_vlm"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      MODEL_NAME: "Qwen/Qwen3-VL-2B-Instruct"
      TRAIN_DATA: "data/stcray_vlm/stcray_vlm_train.jsonl"
      EVAL_DATA: "data/stcray_vlm/stcray_vlm_val.jsonl"
      OUTPUT_DIR: "/home/cdsw/checkpoints/qwen3vl-2b-xray-qlora"
      BATCH_SIZE: "6"
      EPOCHS: "3"
      GRADIENT_ACCUMULATION_STEPS: "2"
      LEARNING_RATE: "2e-4"
      WARMUP_STEPS: "100"
      MAX_SEQ_LENGTH: "2048"
      LOGGING_STEPS: "10"
      SAVE_STEPS: "500"
      EVAL_STEPS: "500"
      LORA_R: "16"
      LORA_ALPHA: "32"
      LORA_DROPOUT: "0.05"
      SEED: "42"
      RESUME_FROM_CHECKPOINT: ""

  # Job 5: Evaluate Fine-tuned Model
  evaluate_vlm:
    name: "VLM Evaluate Fine-tuned Model"
    description: "Compare base vs fine-tuned model on STCray test set (precision, recall, F1, IoU)"
    script: "cai_integration/evaluate_vlm.py"
    kernel: "python3"
    cpu: 4
    memory: 32
    gpu: 1
    timeout: 7200  # 2 hours
    parent_job_key: "train_vlm_qlora"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      BASE_MODEL: "Qwen/Qwen3-VL-2B-Instruct"
      FINETUNED_MODEL: "/home/cdsw/checkpoints/qwen3vl-2b-xray-qlora/final"
      TEST_DATA: "data/stcray_vlm/stcray_vlm_test.jsonl"
      OUTPUT_DIR: "/home/cdsw/test_results/vlm_qlora_eval"
      IOU_THRESHOLD: "0.5"
      NUM_SAMPLES: ""

# Execution order (defined by parent_job_key):
# 1. setup_environment        (root — installs PyTorch, Transformers, PEFT, TRL, etc.)
# 2. download_dataset          (depends on: setup_environment)
# 3. convert_stcray_vlm        (depends on: download_dataset)
# 4. train_vlm_qlora           (depends on: convert_stcray_vlm)
# 5. evaluate_vlm              (depends on: train_vlm_qlora)
#
# Resource notes:
# - T4 GPU (16GB VRAM): sufficient for QLoRA training with batch_size=2
# - Training time: ~36-45 hours for 3 epochs on ~37K training images
# - Checkpoint size: ~50-100MB (LoRA adapters only)
# - Peak VRAM: ~6-8GB during training (4-bit quantization + LoRA)
# - Checkpoints saved every 500 steps for CAI job resumption
