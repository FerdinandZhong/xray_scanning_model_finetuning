# CAI Job Pipeline for VLM (Qwen3-VL-2B) QLoRA Training
# X-ray Multi-Object Threat Detection with STCray Dataset
#
# Pipeline: Download STCray → Convert to VLM format → Train with QLoRA → Evaluate
#
# Environment Variables:
#   MODEL_NAME: Model to fine-tune (default: Qwen/Qwen3-VL-2B-Instruct)
#   BATCH_SIZE: Training batch size (default: 2 for T4 GPU)
#   EPOCHS: Number of training epochs (default: 3)
#   LORA_R: LoRA rank (default: 16)
#   LORA_ALPHA: LoRA alpha (default: 32)

# Global environment variables (applied to all jobs)
environment_variables:
  PYTHONUNBUFFERED: "1"
  CUDA_VISIBLE_DEVICES: "0"
  MODEL_NAME: "Qwen/Qwen3-VL-2B-Instruct"
  BATCH_SIZE: "2"
  EPOCHS: "3"
  LORA_R: "16"
  LORA_ALPHA: "32"

jobs:
  # Job 1: Download and prepare STCray dataset
  download_dataset:
    name: "Download STCray Dataset"
    description: "Download and extract STCray dataset from Git LFS, process annotations"
    script_path: "cai_integration/download_dataset.py"
    runtime_identifier: "python3.11"
    timeout: 1800  # 30 minutes
    cpu: 2
    memory: "8Gi"
    environment_variables:
      FORCE_REPROCESS: "false"  # Set to "true" to force reprocessing
    success_message: "STCray dataset downloaded and processed successfully"
    failure_message: "Failed to download or process STCray dataset"

  # Job 2: Convert STCray to VLM format
  convert_to_vlm:
    parent_job_key: download_dataset
    name: "Convert STCray to VLM Format"
    description: "Transform STCray annotations to VQA-style JSONL for VLM training"
    script_path: "data/convert_stcray_to_vlm.py"
    runtime_identifier: "python3.11"
    timeout: 900  # 15 minutes
    cpu: 4
    memory: "16Gi"
    arguments:
      - "--input-dir"
      - "data/stcray_processed"
      - "--output-dir"
      - "data/stcray_vlm"
      - "--val-ratio"
      - "0.1"
      - "--seed"
      - "42"
    success_message: "Dataset converted to VLM format with train/val/test splits"
    failure_message: "Failed to convert dataset to VLM format"

  # Job 3: Train VLM with QLoRA
  train_vlm_qlora:
    parent_job_key: convert_to_vlm
    name: "Train Qwen3-VL-2B with QLoRA"
    description: "Fine-tune Qwen3-VL-2B-Instruct using QLoRA on STCray dataset"
    script_path: "training/train_vlm_qlora.py"
    runtime_identifier: "python3.11"
    timeout: 172800  # 48 hours (2 days for full training)
    cpu: 8
    memory: "64Gi"
    gpu: 1
    gpu_type: "T4"  # T4 GPU with 16GB VRAM
    environment_variables:
      # Model and data
      MODEL_NAME: "${MODEL_NAME}"
      TRAIN_DATA: "data/stcray_vlm/stcray_vlm_train.jsonl"
      EVAL_DATA: "data/stcray_vlm/stcray_vlm_val.jsonl"
      OUTPUT_DIR: "/home/cdsw/checkpoints/qwen3vl-2b-xray-qlora"
      # Training hyperparameters
      NUM_TRAIN_EPOCHS: "${EPOCHS}"
      PER_DEVICE_TRAIN_BATCH_SIZE: "${BATCH_SIZE}"
      PER_DEVICE_EVAL_BATCH_SIZE: "${BATCH_SIZE}"
      GRADIENT_ACCUMULATION_STEPS: "4"
      LEARNING_RATE: "2e-4"
      WARMUP_STEPS: "100"
      MAX_SEQ_LENGTH: "2048"
      LOGGING_STEPS: "10"
      SAVE_STEPS: "500"
      EVAL_STEPS: "500"
      # QLoRA parameters
      LORA_R: "${LORA_R}"
      LORA_ALPHA: "${LORA_ALPHA}"
      LORA_DROPOUT: "0.05"
      SEED: "42"
    arguments:
      - "--model-name"
      - "${MODEL_NAME}"
      - "--train-data"
      - "${TRAIN_DATA}"
      - "--eval-data"
      - "${EVAL_DATA}"
      - "--output-dir"
      - "${OUTPUT_DIR}"
      - "--num-train-epochs"
      - "${NUM_TRAIN_EPOCHS}"
      - "--per-device-train-batch-size"
      - "${PER_DEVICE_TRAIN_BATCH_SIZE}"
      - "--per-device-eval-batch-size"
      - "${PER_DEVICE_EVAL_BATCH_SIZE}"
      - "--gradient-accumulation-steps"
      - "${GRADIENT_ACCUMULATION_STEPS}"
      - "--learning-rate"
      - "${LEARNING_RATE}"
      - "--warmup-steps"
      - "${WARMUP_STEPS}"
      - "--max-seq-length"
      - "${MAX_SEQ_LENGTH}"
      - "--logging-steps"
      - "${LOGGING_STEPS}"
      - "--save-steps"
      - "${SAVE_STEPS}"
      - "--eval-steps"
      - "${EVAL_STEPS}"
      - "--lora-r"
      - "${LORA_R}"
      - "--lora-alpha"
      - "${LORA_ALPHA}"
      - "--lora-dropout"
      - "${LORA_DROPOUT}"
      - "--seed"
      - "${SEED}"
    success_message: "VLM training completed successfully"
    failure_message: "VLM training failed - check logs for details"

  # Job 4: Evaluate fine-tuned model
  evaluate_vlm:
    parent_job_key: train_vlm_qlora
    name: "Evaluate Fine-tuned VLM"
    description: "Compare base model vs fine-tuned model on test set"
    script_path: "evaluation/eval_vlm_qlora.py"
    runtime_identifier: "python3.11"
    timeout: 7200  # 2 hours
    cpu: 4
    memory: "32Gi"
    gpu: 1
    gpu_type: "T4"
    environment_variables:
      BASE_MODEL: "${MODEL_NAME}"
      FINETUNED_MODEL: "/home/cdsw/checkpoints/qwen3vl-2b-xray-qlora/final"
      TEST_DATA: "data/stcray_vlm/stcray_vlm_test.jsonl"
      OUTPUT_DIR: "/home/cdsw/test_results/vlm_qlora_eval"
      IOU_THRESHOLD: "0.5"
      NUM_SAMPLES: ""  # Empty = evaluate all samples
    arguments:
      - "--base-model"
      - "${BASE_MODEL}"
      - "--finetuned-model"
      - "${FINETUNED_MODEL}"
      - "--test-data"
      - "${TEST_DATA}"
      - "--output-dir"
      - "${OUTPUT_DIR}"
      - "--iou-threshold"
      - "${IOU_THRESHOLD}"
    success_message: "Evaluation completed - results saved to test_results/"
    failure_message: "Evaluation failed - check logs"

# Job execution order (defined by parent_job_key):
# 1. download_dataset
# 2. convert_to_vlm (depends on: download_dataset)
# 3. train_vlm_qlora (depends on: convert_to_vlm)
# 4. evaluate_vlm (depends on: train_vlm_qlora)

# Monitoring and alerts
monitoring:
  enabled: true
  metrics:
    - job_duration
    - gpu_utilization
    - memory_usage
    - training_loss
    - evaluation_metrics

# Resource notes:
# - T4 GPU (16GB VRAM): Sufficient for QLoRA training with batch_size=2
# - Training time: ~36-45 hours for 3 epochs on 37,316 images
# - Checkpoint size: ~50-100MB (LoRA adapters only)
# - Memory peak: ~6-8GB VRAM during training
