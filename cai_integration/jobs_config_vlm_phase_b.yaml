# CAI Job Pipeline for VLM Phase B: Proposal-Guided Dual-Format Training
#
# Trains class-agnostic YOLO on STCray+HiXray, generates dual-format VQA data,
# then fine-tunes Qwen3-VL-2B with proposal-guided prompts.
#
# Prerequisites:
#   - Phase A completed (checkpoints exist)
#   - HiXray archive manually pre-staged to /home/cdsw/data/hixray_raw/ (or gdown fallback)
#
# Pipeline:
#   setup_environment → prepare_hixray → prepare_class_agnostic_yolo
#     → train_yolo_class_agnostic → create_pgrav_vqa → train_vlm_phase_b
#     → merge_lora → evaluate_vlm
#
# Usage:
#   python cai_integration/create_jobs.py --project-id $PID --config cai_integration/jobs_config_vlm_phase_b.yaml
#   python cai_integration/trigger_jobs.py --project-id $PID --jobs-config cai_integration/jobs_config_vlm_phase_b.yaml

jobs:
  # Job 1: Setup Environment (ROOT)
  setup_environment:
    name: "Phase B Setup Environment"
    description: "Install combined YOLO + VLM dependencies (ultralytics, transformers, peft, trl)"
    script: "cai_integration/setup_environment.py"
    kernel: "python3"
    cpu: 4
    memory: 16
    timeout: 3600
    parent_job_key: null
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      FORCE_REINSTALL: "false"
      REQUIREMENTS_FILE: "setup/requirements_phase_b.txt"

  # Job 2: Download STCray Dataset
  download_dataset:
    name: "Phase B Download STCray Dataset"
    description: "Download STCray dataset from HuggingFace (46K images, 21 threat categories)"
    script: "cai_integration/download_dataset.py"
    kernel: "python3"
    cpu: 4
    memory: 8
    timeout: 3600
    parent_job_key: "setup_environment"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      FORCE_REPROCESS: "false"

  # Job 3: Prepare HiXray Dataset
  prepare_hixray:
    name: "Phase B Prepare HiXray Dataset"
    description: "Extract and verify HiXray dataset (45K everyday item images). Pre-stage archive to /home/cdsw/data/hixray_raw/ before running."
    script: "cai_integration/prepare_hixray.py"
    kernel: "python3"
    cpu: 4
    memory: 16
    timeout: 7200
    parent_job_key: "download_dataset"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      HIXRAY_ARCHIVE: "data/hixray_raw"
      OUTPUT_DIR: "data/hixray_processed"
      FORCE_REPROCESS: "false"

  # Job 3: Prepare Class-Agnostic YOLO Data
  prepare_class_agnostic_yolo:
    name: "Phase B Prepare Class-Agnostic YOLO Data"
    description: "Merge STCray + HiXray bounding boxes into single 'object' class YOLO format"
    script: "cai_integration/prepare_class_agnostic_yolo.py"
    kernel: "python3"
    cpu: 4
    memory: 16
    timeout: 3600
    parent_job_key: "prepare_hixray"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      STCRAY_DIR: "data/stcray_processed"
      HIXRAY_DIR: "data/hixray_processed"
      OUTPUT_DIR: "data/class_agnostic_yolo"
      FORCE_REPROCESS: "false"

  # Job 4: Train Class-Agnostic YOLO
  train_yolo_class_agnostic:
    name: "Phase B Train Class-Agnostic YOLO"
    description: "Train YOLOv11-small as class-agnostic object detector on ~90K X-ray images (~6-8h on L40)"
    script: "cai_integration/train_yolo_class_agnostic.py"
    kernel: "python3"
    cpu: 8
    memory: 48
    gpu: 1
    timeout: 43200
    parent_job_key: "prepare_class_agnostic_yolo"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      DATA_YAML: "data/class_agnostic_yolo/data.yaml"
      MODEL_NAME: "yolo11s.pt"
      EPOCHS: "150"
      BATCH_SIZE: "64"
      IMG_SIZE: "640"
      PATIENCE: "25"
      PROJECT: "runs/detect"
      RUN_NAME: "class_agnostic_xray_v2"
      FORCE_REPROCESS: "false"

  # Job 5: Generate Dual-Format VQA Data
  create_pgrav_vqa:
    name: "Phase B Create PG-RAV VQA Data"
    description: "Run class-agnostic YOLO on training images, generate dual-format (full-scene + focused ROI) VQA data"
    script: "cai_integration/create_pgrav_vqa.py"
    kernel: "python3"
    cpu: 8
    memory: 32
    gpu: 1
    timeout: 14400
    parent_job_key: "train_yolo_class_agnostic"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      YOLO_MODEL: "runs/detect/class_agnostic_xray/weights/best.pt"
      STCRAY_DIR: "data/stcray_processed"
      HIXRAY_DIR: "data/hixray_processed"
      OUTPUT_DIR: "data/pgrav_vqa"
      FORCE_REPROCESS: "false"

  # Job 6: Train VLM Phase B (Proposal-Guided Dual-Format)
  train_vlm_phase_b:
    name: "Phase B Train Qwen3-VL-2B PG-RAV"
    description: "Fine-tune Qwen3-VL-2B with proposal-guided dual-format data (~12-18h on L40)"
    script: "cai_integration/train_vlm.py"
    kernel: "python3"
    cpu: 8
    memory: 96
    gpu: 1
    timeout: 86400
    parent_job_key: "create_pgrav_vqa"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      MODEL_NAME: "Qwen/Qwen3-VL-2B-Instruct"
      TRAIN_DATA: "data/pgrav_vqa/pgrav_train.jsonl"
      EVAL_DATA: "data/pgrav_vqa/pgrav_val.jsonl"
      OUTPUT_DIR: "/home/cdsw/checkpoints/qwen3vl-2b-pgrav-qlora"
      BATCH_SIZE: "6"
      EPOCHS: "3"
      GRADIENT_ACCUMULATION_STEPS: "2"
      LEARNING_RATE: "1e-4"
      WARMUP_STEPS: "200"
      MAX_SEQ_LENGTH: "2048"
      LOGGING_STEPS: "10"
      SAVE_STEPS: "500"
      EVAL_STEPS: "500"
      LORA_R: "16"
      LORA_ALPHA: "32"
      LORA_DROPOUT: "0.05"
      SEED: "42"
      RESUME_FROM_CHECKPOINT: ""

  # Job 7: Merge LoRA Adapter
  merge_lora:
    name: "Phase B Merge LoRA Adapter"
    description: "Merge Phase B LoRA adapter into base model for deployment"
    script: "cai_integration/merge_lora.py"
    kernel: "python3"
    cpu: 8
    memory: 32
    gpu: 1
    timeout: 3600
    parent_job_key: "train_vlm_phase_b"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      BASE_MODEL: "Qwen/Qwen3-VL-2B-Instruct"
      ADAPTER_PATH: "/home/cdsw/checkpoints/qwen3vl-2b-pgrav-qlora/final"
      OUTPUT_DIR: "/home/cdsw/models/qwen3vl-2b-pgrav-merged"

  # Job 8: Evaluate Phase B Model
  evaluate_vlm:
    name: "Phase B Evaluate PG-RAV Model"
    description: "Compare base vs Phase A vs Phase B models on STCray+HiXray test sets"
    script: "cai_integration/evaluate_vlm.py"
    kernel: "python3"
    cpu: 4
    memory: 32
    gpu: 1
    timeout: 14400
    parent_job_key: "merge_lora"
    runtime_identifier: "docker.repository.cloudera.com/cloudera/cdsw/ml-runtime-pbj-workbench-python3.10-cuda:2026.01.1-b6"
    environment:
      BASE_MODEL: "Qwen/Qwen3-VL-2B-Instruct"
      FINETUNED_MODEL: "/home/cdsw/models/qwen3vl-2b-pgrav-merged"
      TEST_DATA: "data/pgrav_vqa/pgrav_test.jsonl"
      OUTPUT_DIR: "/home/cdsw/test_results/vlm_pgrav_eval"
      IOU_THRESHOLD: "0.5"
      NUM_SAMPLES: ""

# Execution order:
# 1. setup_environment      (root — installs YOLO + VLM deps)
# 2. prepare_hixray          (extract HiXray dataset)
# 3. prepare_class_agnostic  (merge STCray+HiXray → "object" class)
# 4. train_yolo              (class-agnostic YOLO ~12h)
# 5. create_pgrav_vqa        (generate dual-format VQA from proposals)
# 6. train_vlm_phase_b       (QLoRA on dual-format data ~2-3 days)
# 7. merge_lora              (merge adapter into base model)
# 8. evaluate_vlm            (Phase A vs Phase B comparison)
#
# Total estimated time: ~4-5 days on single T4 GPU
